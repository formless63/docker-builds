name: Build SuperSync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 */3 * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/supersync

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Upstream Repo
        uses: actions/checkout@v4
        with:
          repository: super-productivity/super-productivity
          ref: master
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=true
          tags: |
            # Tag 1: The date (e.g., :2026-02-09) - Works for manual AND schedule
            type=raw,value={{date 'YYYY-MM-DD'}}
            # Tag 2: The SHA (e.g., :sha-8a7c1f)
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .  
          file: packages/super-sync-server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
